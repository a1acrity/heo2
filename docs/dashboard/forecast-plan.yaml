# HEO II — View 1: Forecast & Plan
# Requires: apexcharts-card, mushroom, flex-table-card

title: Forecast & Plan
path: forecast-plan
cards:
  # 24-hour energy chart
  - type: custom:apexcharts-card
    header:
      title: 24-Hour Energy Forecast
      show: true
    graph_span: 24h
    span:
      start: day
    series:
      - entity: sensor.heo2_solar_forecast_hourly
        data_generator: |
          const forecast = entity.attributes.forecast || [];
          return forecast.map((val, i) => {
            const d = new Date();
            d.setHours(i, 0, 0, 0);
            return [d.getTime(), val];
          });
        name: Solar (kWh)
        type: area
        color: "#f59e0b"
        opacity: 0.3
      - entity: sensor.heo2_load_forecast_hourly
        data_generator: |
          const forecast = entity.attributes.forecast || [];
          return forecast.map((val, i) => {
            const d = new Date();
            d.setHours(i, 0, 0, 0);
            return [d.getTime(), val];
          });
        name: Load (W)
        type: line
        color: "#ef4444"
        stroke_width: 2
        stroke_dash: 4
      # Live actuals overlaid on the forecast for visual comparison
      # of "did the day go as predicted?"
      - entity: sensor.sa_inverter_1_pv_power
        name: Actual PV (W)
        type: line
        color: "#f59e0b"
        stroke_width: 2
      - entity: sensor.deye_sunsynk_sol_ark_load_power
        name: Actual load (W)
        type: line
        color: "#ef4444"
        stroke_width: 2

  # SOC trajectory chart. trajectory[h] is the projected SOC AT
  # clock hour h LOCAL time. Past hours are flat-filled with
  # current_soc; future hours are simulated. 48-hour horizon covers
  # today + tomorrow.
  #
  # Second series overlays grid_charge=True windows from
  # `sensor.heo_ii_programme_slots` so the user can visually
  # correlate which times the inverter is pulling from the grid
  # vs which are drain windows. The slot programme repeats daily, so
  # the overlay emits each GC slot for BOTH today and tomorrow.
  - type: custom:apexcharts-card
    header:
      title: Battery SOC Trajectory
      show: true
    graph_span: 48h
    span:
      start: day
    apex_config:
      xaxis:
        labels:
          datetimeFormatter:
            hour: "ddd HH:mm"
    yaxis:
      - min: 0
        max: 100
    series:
      - entity: sensor.heo2_soc_trajectory
        data_generator: |
          const trajectory = entity.attributes.trajectory || [];
          const base = new Date();
          base.setHours(0, 0, 0, 0);
          return trajectory.map((val, i) => {
            const d = new Date(base.getTime() + i * 3600 * 1000);
            return [d.getTime(), val];
          });
        name: Planned SOC (%)
        type: line
        color: "#14b8a6"
        stroke_width: 3
      # Live battery SOC overlaid against the plan. Drift between the
      # cyan and teal lines is "we are off-plan".
      - entity: sensor.sa_total_battery_state_of_charge
        name: Actual SOC (%)
        type: line
        color: "#0ea5e9"
        stroke_width: 2
      - entity: sensor.heo2_programme_slots
        data_generator: |
          const slots = entity.attributes.slots || [];
          const base = new Date();
          base.setHours(0, 0, 0, 0);
          const points = [];
          // Render the slot programme for BOTH today and tomorrow so
          // the overlay covers the 48h chart span.
          for (let day = 0; day < 2; day++) {
            const dayStart = base.getTime() + day * 86400 * 1000;
            for (const s of slots) {
              const [sh, sm] = s.start.split(':').map(Number);
              const [eh, em] = s.end.split(':').map(Number);
              const startMs = dayStart + (sh * 60 + sm) * 60 * 1000;
              let endMs = dayStart + (eh * 60 + em) * 60 * 1000;
              if (endMs <= startMs) endMs += 86400 * 1000; // wrap midnight
              const value = s.grid_charge ? 100 : 0;
              points.push([startMs, value]);
              points.push([endMs, value]);
              points.push([endMs, 0]);  // drop edge so step is clean
            }
          }
          return points;
        name: Grid charge active
        type: area
        color: "#a855f7"
        opacity: 0.15
        stroke_width: 0
        curve: stepline

  # SPEC §6 projection summary - one-line forecast of today's outcome.
  # Icon turns orange when the projection forecasts > 0.1 kWh of
  # peak-rate import so the user can spot it on the main view.
  - type: custom:mushroom-template-card
    primary: Today projection
    secondary: "{{ states('sensor.heo_ii_projection_today') }}"
    icon: mdi:chart-line
    icon_color: >-
      {% if state_attr('sensor.heo_ii_projection_today',
      'peak_import_kwh') | float(0) > 0.1 %}orange{% else %}green{% endif %}
    fill_container: true
    multiline_secondary: true
    tap_action:
      action: more-info

  # Programme slots table
  - type: custom:flex-table-card
    title: Programme Slots
    entities:
      include: sensor.heo2_programme_slots
    columns:
      - name: "#"
        data: slots
        modify: x.index + 1
      - name: Start
        data: slots
        modify: x.start
      - name: End
        data: slots
        modify: x.end
      - name: SOC Target
        data: slots
        modify: x.soc + '%'
      - name: Grid Charge
        data: slots
        modify: "x.grid_charge ? '✅' : '❌'"

  # Today vs Plan summary - actual vs forecast at a glance.
  # Battery drift colour: green<5%, amber<15%, red beyond.
  - type: entities
    title: Today vs Plan
    entities:
      - type: custom:mushroom-template-card
        primary: Plan vs reality
        secondary: >-
          Battery {{ states('sensor.sa_total_battery_state_of_charge') }}%
          vs plan
          {% set traj = state_attr('sensor.heo_ii_soc_trajectory', 'trajectory') %}
          {% if traj %}{{ traj[now().hour] | round(0) }}%
          (drift {{ (states('sensor.sa_total_battery_state_of_charge') | int
          - traj[now().hour]) | round(0) }}%){% else %}-{% endif %}
        icon: mdi:battery-sync
        icon_color: >-
          {% set traj = state_attr('sensor.heo_ii_soc_trajectory', 'trajectory') %}
          {% if traj %}
          {% set drift = ((states('sensor.sa_total_battery_state_of_charge') | int)
          - (traj[now().hour] | int)) | abs %}
          {% if drift < 5 %}green{% elif drift < 15 %}orange{% else %}red{% endif %}
          {% else %}grey{% endif %}
        fill_container: true
        multiline_secondary: true
      - entity: sensor.heo_ii_projection_today
        name: Forecast result
      - entity: sensor.heo_ii_daily_import_cost
        name: "Actual import £"
      - entity: sensor.heo_ii_daily_export_revenue
        name: "Actual export £"
      - entity: sensor.heo_ii_daily_solar_value
        name: "Actual solar value £"

  # Info chips
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.heo2_active_rules
            icon: mdi:format-list-checks
          - type: entity
            entity: sensor.heo2_next_action
            icon: mdi:battery-charging
          - type: entity
            entity: sensor.heo2_programme_reason
            icon: mdi:information-outline
